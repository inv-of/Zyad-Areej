<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zyad&Areej Wedding Invitation</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(255,248,240,0.45), rgba(255,248,240,0.45)),
      url("background.jpg");
      background-size:cover;
      background-position:center;
      font-family:'Cinzel', serif;
      position:relative;
    }

    /* ================= FLOATING ICONS ================= */

    .floating-icons{
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;
      overflow:hidden;
      pointer-events:none;
    }

    .floating-icons span{
      position:absolute;
      bottom:-100px;
      color:rgba(122,92,69,0.18);
      font-size:24px;
      animation:float 15s linear infinite;
    }

    .floating-icons span:nth-child(1){
      left:10%;
      animation-duration:12s;
    }

    .floating-icons span:nth-child(2){
      left:25%;
      animation-duration:18s;
    }

    .floating-icons span:nth-child(3){
      left:45%;
      animation-duration:14s;
    }

    .floating-icons span:nth-child(4){
      left:65%;
      animation-duration:20s;
    }

    .floating-icons span:nth-child(5){
      left:85%;
      animation-duration:16s;
    }

    /* ================= CONTAINER ================= */

    .container{
      text-align:center;
      z-index:2;
      animation:fadeIn 1.5s ease;
    }

    .title{
      color:#6B4F3A;
      font-size:24px;
      letter-spacing:5px;
      margin-bottom:45px;
      text-shadow:0 0 12px rgba(255,255,255,0.6);
    }

    /* ================= ENVELOPE ================= */

    .envelope-wrapper{
      position:relative;
      width:340px;
      height:220px;
      cursor:pointer;
      transition:0.5s;
      perspective:1000px;
    }

    .envelope-wrapper:hover{
      transform:scale(1.03);
    }

    .envelope{
      position:relative;
      width:100%;
      height:100%;
    }

    /* Main Envelope */

    .base{
      position:absolute;
      width:100%;
      height:100%;
      background:#E9D8C6;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 20px 40px rgba(122,92,69,0.18);
    }

    /* Left Fold */

    .left{
      position:absolute;
      width:50%;
      height:100%;
      background:#DCC3A8;
      clip-path:polygon(0 0, 100% 50%, 0 100%);
      left:0;
      top:0;
    }

    /* Right Fold */

    .right{
      position:absolute;
      width:50%;
      height:100%;
      background:#CFAE8D;
      clip-path:polygon(100% 0, 0 50%, 100% 100%);
      right:0;
      top:0;
    }

    /* Bottom Fold */

    .bottom{
      position:absolute;
      width:100%;
      height:55%;
      background:#E2CBB3;
      bottom:0;
      clip-path:polygon(0 100%, 50% 0, 100% 100%);
    }

    /* Top Flap */

    .flap{
      position:absolute;
      width:100%;
      height:55%;
      background:#C89F7A;
      top:0;
      left:0;
      clip-path:polygon(0 0, 50% 100%, 100% 0);
      transform-origin:top;
      transition:0.8s ease;
      z-index:5;
    }

    /* Open Animation */

    .open .flap{
      transform:rotateX(180deg);
    }

    /* Glow */

    .envelope-wrapper::after{
      content:"";
      position:absolute;
      width:120%;
      height:120%;
      top:-10%;
      left:-10%;
      border-radius:20px;
      background:rgba(255,255,255,0.18);
      filter:blur(35px);
      z-index:-1;
    }

    /* ================= ANIMATIONS ================= */

    @keyframes float{

      0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
      }

      10%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
      }

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* ================= MOBILE ================= */

    @media(max-width:768px){

      .envelope-wrapper{
        width:280px;
        height:190px;
      }

      .title{
        font-size:18px;
        letter-spacing:3px;
      }

    }

  </style>
</head>
<body>

  <!-- Floating Icons -->

  <div class="floating-icons">

    <span>❀</span>
    <span>❤</span>
    <span>❀</span>
    <span>❤</span>
    <span>❀</span>

  </div>

  <!-- Main Content -->

  <div class="container">

    <div class="title">
      Open The Invitation
    </div>

    <div class="envelope-wrapper" id="envelope">

      <div class="envelope">

        <div class="base"></div>

        <div class="left"></div>

        <div class="right"></div>

        <div class="bottom"></div>

        <div class="flap"></div>

      </div>

    </div>

  </div>

  <!-- Script -->

  <script>

    const envelope = document.getElementById("envelope");

    envelope.addEventListener("click", () => {

      envelope.classList.add("open");

      setTimeout(() => {

        window.location.href = "main.html";

      }, 850);

    });

  </script>

</body>
</html>
